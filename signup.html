<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign Up | Defensive Play Predictor</title><link rel="stylesheet" href="assets/styles.css"></head><body><script src="assets/nav.js"></script><main class="auth-shell"><div class="card auth-card"><div class="eyebrow">Coach signup</div><h2>Create your account</h2><p class="muted">This creates the coach login. After Supabase is connected, coaches can sign up without emailing you.</p><form class="form" onsubmit="signupCoach(event)"><div><label>Your name</label><input id="full_name" required placeholder="Coach Smith"></div><div><label>Team name</label><input id="team_name" required placeholder="Eastside Eagles"></div><div><label>Email</label><input id="email" type="email" required placeholder="coach@school.com"></div><div><label>Password</label><input id="password" type="password" required minlength="6" placeholder="Minimum 6 characters"></div><button class="btn gold" type="submit">Create account</button><div id="authMsg" class="small muted"></div></form><p class="small muted">Already have an account? <a href="login.html">Log in</a>.</p><p class="notice small">Before Supabase is connected, this page will show a setup message instead of creating accounts.</p></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/config.js"></script><script src="assets/supabase-app.js"></script></body></html>
